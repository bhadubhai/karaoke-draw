<!DOCTYPE html>
<html>
<head>
    <title>Karaoke Draw</title>

    <!-- MOBILE RESPONSIVE -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #000428, #004e92);
            color: white;
            text-align: center;
        }

        h1 {
            font-size: 26px;
            margin-top: 20px;
        }

        .branding {
            font-size: 14px;
            margin-bottom: 20px;
        }

        .branding span {
            color: #00e6ff;
            font-weight: bold;
        }

        /* CARD */
        .card {
            background: white;
            color: black;
            margin: 20px;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
        }

        select, button, input {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            font-size: 16px;
            border-radius: 8px;
            border: none;
        }

        button {
            background: linear-gradient(135deg, #ff512f, #dd2476);
            color: white;
            font-weight: bold;
        }

        button:active {
            transform: scale(0.97);
        }

        .result {
            margin-top: 15px;
            font-size: 18px;
            font-weight: bold;
            color: #ffeb3b;
        }

        /* TABLE */
        table {
            width: 95%;
            margin: 20px auto;
            border-collapse: collapse;
            background: white;
            color: black;
            border-radius: 10px;
            overflow: hidden;
            font-size: 14px;
        }

        th, td {
            padding: 8px;
            border-bottom: 1px solid #ddd;
        }

        th {
            background: #004e92;
            color: white;
        }

        /* MOBILE OPTIMIZATION */
        @media (max-width: 600px) {
            h1 {
                font-size: 22px;
            }

            .card {
                margin: 10px;
                padding: 15px;
            }

            table {
                font-size: 12px;
            }
        }

        .footer {
            margin: 20px;
            font-size: 12px;
        }

        .footer span {
            color: #00e6ff;
        }

    </style>
</head>
<body>

<h1>🎤 Karaoke Draw</h1>

<div class="branding">
    Organised by <span>RN Musical Group</span><br>
    Developed by <span>Bhadresh Tech</span>
</div>

<div class="card">
    <form method="POST">
        <select name="name" required>
            <option value="">Select Your Name</option>
            {% for singer, songs in singers.items() %}
                <option value="{{ singer }}">{{ singer }} ({{ songs }})</option>
            {% endfor %}
        </select>

        <button type="submit">🎲 Draw Slots</button>
    </form>

    {% if result %}
        <div class="result">{{ result }}</div>
    {% endif %}
</div>

<!-- TABLE -->
<table>
    <tr>
        <th>Singer</th>
        <th>Slot</th>
    </tr>

    {% for item in data %}
    <tr>
        <td>{{ item.name }}</td>
        <td>{{ item.slot }}</td>
    </tr>
    {% endfor %}
</table>

<!-- RESET -->
<div style="margin:15px;">
    <form method="POST" action="/reset" style="display:flex; gap:5px;">
        <input type="password" name="password" placeholder="🔑" 
               style="flex:1; padding:8px; border-radius:6px;">
        <button type="submit" 
                style="padding:8px 12px; border-radius:6px;">
            🔁
        </button>
    </form>
</div>

<div class="footer">
    🎤 Live Event System
</div>

</body>
</html>
